<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJF REGI 書類管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap');

:root {
  --ink: #1a1a2e;
  --ink-light: #4a4a6a;
  --paper: #f8f6f0;
  --paper-warm: #ede9e0;
  --accent: #c0392b;
  --accent-light: #e74c3c;
  --border: #d4cfc5;
  --shadow: rgba(26,26,46,0.12);
  --success: #27ae60;
  --blue: #2980b9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

header {
  background: var(--ink); color: white; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
}
header h1 { font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
header h1 span { color: #e74c3c; }
.header-meta { font-size: 11px; opacity: 0.55; }

.tabs { background: var(--ink); display: flex; padding: 0 8px; border-top: 1px solid rgba(255,255,255,0.08); overflow-x: auto; flex-wrap: nowrap; }
.tab-btn {
  background: none; border: none; color: rgba(255,255,255,0.5);
  padding: 7px 10px; cursor: pointer; font-size: 11px;
  font-family: 'Noto Sans JP', sans-serif;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  white-space: nowrap; flex-shrink: 0;
}
.tab-btn.active { color: white; border-bottom-color: #e74c3c; }
.tab-btn:hover { color: white; }

main { padding: 24px; max-width: 1100px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.section-title { font-family: 'Noto Serif JP', serif; font-size: 19px; font-weight: 700; }
.section-title small { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--ink-light); margin-left: 8px; font-weight: 400; }

.btn {
  padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer;
  font-size: 13px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-light); }
.btn-secondary { background: var(--ink); color: white; }
.btn-secondary:hover { background: #2c2c4e; }
.btn-outline { background: white; color: var(--ink); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--paper-warm); }
.btn-success { background: var(--success); color: white; }
.btn-blue { background: var(--blue); color: white; }
.btn-pdf { background: #8e44ad; color: white; }
.btn-pdf:hover { background: #9b59b6; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.month-bar {
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 18px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.month-bar label { font-size: 13px; font-weight: 500; }
.month-bar input[type="month"] {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px; background: var(--paper);
}
.month-bar .stat { margin-left: auto; font-size: 13px; color: var(--ink-light); }
.month-bar .stat strong { color: var(--accent); font-size: 17px; }

.inv-table-wrap { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.inv-table th { background: var(--ink); color: white; padding: 10px 12px; text-align: left; font-weight: 500; }
.inv-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.inv-table tr:last-child td { border-bottom: none; }
.inv-table tr:hover td { background: var(--paper); }
.inv-table .amount { font-weight: 700; color: var(--accent); }
.inv-table .actions { display: flex; gap: 5px; flex-wrap: wrap; }
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.status-pending { background: #fef3cd; color: #856404; }
.status-paid { background: #d1f2e1; color: #1a7a41; }

.total-row {
  background: var(--paper-warm); display: flex; justify-content: flex-end;
  padding: 12px 18px; border-top: 2px solid var(--border); gap: 28px; flex-wrap: wrap;
}
.total-item { text-align: right; }
.total-item label { color: var(--ink-light); display: block; font-size: 11px; }
.total-item strong { font-size: 16px; }
.total-item.grand strong { color: var(--accent); font-size: 20px; }

.store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.store-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.store-card:hover { box-shadow: 0 4px 14px var(--shadow); }
.store-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.store-name { font-weight: 700; font-size: 14px; }
.store-meta { font-size: 12px; color: var(--ink-light); line-height: 1.8; }
.store-actions { display: flex; gap: 6px; margin-top: 10px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 10px; padding: 26px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal h2 { font-family: 'Noto Serif JP', serif; font-size: 17px; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-light); margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; background: var(--paper); }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }

.line-items { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.line-item-header { display: none; }
/* 見積明細 6列 */
.mit-line-item-header { display: none; }
.mit-line-item-row {
  padding: 8px; border-top: 1px solid var(--border);
  background: var(--paper); margin: 6px; border-radius: 6px;
}
.mit-line-item-row .mit-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.mit-line-item-row .mit-fields .field label { display: block; font-size: 11px; color: var(--ink-light); margin-bottom: 4px; }
.mit-line-item-row .mit-fields .field input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.mit-line-item-row .mit-name-wrap { margin-bottom: 8px; }
.mit-line-item-row .mit-name-wrap label { display: block; font-size: 11px; color: var(--ink-light); margin-bottom: 4px; }
.mit-line-item-row .mit-name-wrap input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.mit-line-footer { display: flex; justify-content: space-between; align-items: center; }
.mit-line-total { font-size: 13px; font-weight: 600; color: var(--accent); }
.line-item-row { padding: 8px; border-top: 1px solid var(--border); background: var(--paper); margin: 6px; border-radius: 6px; }
.line-item-name-wrap { margin-bottom: 8px; }
.line-item-name-wrap label { display: block; font-size: 11px; color: var(--ink-light); margin-bottom: 4px; }
.line-item-name-wrap input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.line-item-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.line-item-nums .field label { display: block; font-size: 11px; color: var(--ink-light); margin-bottom: 4px; }
.line-item-nums .field input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.line-item-footer { display: flex; justify-content: space-between; align-items: center; }
.line-item-total { font-size: 13px; font-weight: 600; color: var(--accent); }
.btn-icon { width: 26px; height: 26px; border: none; background: #fee2e2; color: #991b1b; border-radius: 4px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
.add-line-btn { width: 100%; padding: 7px; background: white; border: none; border-top: 1px solid var(--border); cursor: pointer; color: var(--blue); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; margin-top: 4px; }

/* ===== TEMPLATE ITEMS ===== */
.template-items {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px;
}
.tpl-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; background: white; border-radius: 6px;
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.15s; user-select: none;
}
.tpl-item:hover { border-color: var(--blue); background: #f0f7ff; }
.tpl-item input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--blue);
  cursor: pointer; flex-shrink: 0; margin: 0;
  position: relative; top: 0; vertical-align: middle;
}
.tpl-item input[type="checkbox"]:checked + .tpl-name { color: var(--blue); font-weight: 600; }
.tpl-item:has(input:checked) { border-color: var(--blue); background: #e8f4fd; }
.tpl-name { font-size: 12px; flex: 1; line-height: 1.3; vertical-align: middle; }
.tpl-price { font-size: 11px; color: var(--accent); font-weight: 600; white-space: nowrap; }
@media (max-width: 700px) {
  .template-items { grid-template-columns: 1fr; }
  .tpl-item { padding: 11px 12px; }
  .tpl-item input[type="checkbox"] { width: 18px; height: 18px; }
  .tpl-name { font-size: 14px; }
  .tpl-price { font-size: 13px; }
}

.auto-notice { background: #e8f4fd; border: 1px solid #b3d4f0; border-radius: 8px; padding: 12px 16px; margin-bottom: 18px; font-size: 13px; color: #1a5276; display: flex; align-items: center; gap: 10px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--ink-light); }
.empty-state .icon { font-size: 46px; margin-bottom: 14px; }

/* ===== MOBILE CARD LIST ===== */
.inv-card-list { display: none; }
.inv-card {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 12px; overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}
.inv-card-header {
  background: var(--ink); color: white;
  padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
}
.inv-card-name { font-weight: 700; font-size: 15px; flex: 1; }
.inv-card-badge { font-size: 11px; }
.inv-card-body { padding: 14px 16px; }
.inv-card-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px;
}
.inv-card-row:last-child { border-bottom: none; }
.inv-card-row label { color: var(--ink-light); font-size: 12px; }
.inv-card-row .val { font-weight: 500; }
.inv-card-total {
  background: #fdf0ef; padding: 12px 16px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 2px solid var(--accent);
}
.inv-card-total label { color: var(--ink-light); font-size: 12px; }
.inv-card-total .amount { color: var(--accent); font-size: 20px; font-weight: 700; }
.inv-card-actions {
  padding: 10px 16px; display: flex; gap: 8px;
  background: var(--paper); border-top: 1px solid var(--border);
}
.inv-card-actions .btn { flex: 1; justify-content: center; font-size: 13px; }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 700px) {
  header { padding: 0 14px; height: 52px; }
  header h1 { font-size: 13px; letter-spacing: 0; }
  .header-meta { display: none; }
  .tabs { padding: 0 8px; }
  .tab-btn { padding: 8px 10px; font-size: 12px; }
  main { padding: 14px; }

  .auto-notice { font-size: 12px; padding: 10px 12px; }

  .month-bar {
    padding: 12px; gap: 8px;
    display: grid; grid-template-columns: auto 1fr;
    align-items: center;
  }
  .month-bar label { grid-column: 1; }
  .month-bar input[type="month"] { grid-column: 2; width: 100%; }
  .month-bar .btn-success { grid-column: 1 / -1; width: 100%; justify-content: center; }
  .month-bar .btn-primary { grid-column: 1; }
  .month-bar .btn-pdf { grid-column: 2; }
  .month-bar .stat { grid-column: 1 / -1; text-align: center; margin: 0; }

  /* Hide table, show cards on mobile */
  .inv-table-wrap table { display: none; }
  .inv-card-list { display: block; }
  .inv-table-wrap { background: transparent; border: none; }
  .total-row {
    border-radius: 10px; border: 1px solid var(--border);
    background: white; margin-top: 4px;
    justify-content: space-around;
  }

  .section-header { flex-direction: column; align-items: flex-start; }
  .section-title small { display: block; margin-left: 0; margin-top: 4px; }
  .store-grid { grid-template-columns: 1fr; }

  .preview-toolbar { flex-direction: column; align-items: stretch; gap: 10px; }
  .preview-toolbar select { width: 100%; font-size: 16px; padding: 12px; }
  .preview-toolbar .btn { justify-content: center; padding: 14px; font-size: 15px; }
  .preview-toolbar label { font-size: 14px; font-weight: 600; }
  .preview-frame { border-radius: 0; border-left: none; border-right: none; overflow-x: hidden; }

  /* Modal full screen on mobile */
  .modal { padding: 18px; border-radius: 0; width: 100%; max-width: 100vw; max-height: 100vh; border-radius: 16px 16px 0 0; }
  .form-row { grid-template-columns: 1fr; }
  .modal-footer { flex-direction: column; }
  .modal-footer .btn { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }

  /* Line items - vertical card style on mobile */
  .line-item-header { display: none; }
/* 見積明細 6列 */
.mit-line-item-header { display: none; }

  padding: 8px; border-top: 1px solid var(--border);
  background: var(--paper); margin: 6px; border-radius: 6px;
}
.mit-line-item-row .mit-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.mit-line-item-row .mit-fields .field label { display: block; font-size: 11px; color: var(--ink-light); margin-bottom: 4px; }
.mit-line-item-row .mit-fields .field input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }

.mit-line-item-row .mit-name-wrap label { display: block; font-size: 11px; color: var(--ink-light); margin-bottom: 4px; }
.mit-line-item-row .mit-name-wrap input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.mit-line-footer { display: flex; justify-content: space-between; align-items: center; }

  .line-item-row {
    display: flex; flex-direction: column;

  }

  .line-item-row .line-item-name-wrap label { font-size: 11px; color: var(--ink-light); font-weight: 500; }

}

/* PDF loading overlay */
.pdf-loading {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
.pdf-loading.show { display: flex; }
.pdf-loading p { color: white; font-size: 15px; }
.spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== INVOICE RENDER (off-screen for PDF) ===== */
#pdfRenderArea {
  position: fixed; left: -9999px; top: 0; width: 794px;
  background: white; font-family: 'Noto Sans JP', sans-serif;
}

/* ===== 日式請求書スタイル ===== */
.inv-page {
  width: 794px; min-height: 1123px; background: white;
  padding: 44px 52px 40px; font-size: 13px; line-height: 1.75;
  font-family: 'Noto Sans JP', sans-serif; color: #111;
  box-sizing: border-box;
}

/* タイトル：居中 */
.inv-page .p-title {
  text-align: center; font-size: 20px; font-weight: 700;
  letter-spacing: 4px; border-bottom: 2px solid #111;
  padding-bottom: 10px; margin-bottom: 24px;
}

/* 上部2カラム */
.inv-page .p-top {
  display: flex; gap: 8px; margin-bottom: 28px; align-items: flex-start;
}
.inv-page .p-top-left { flex: 1; }
.inv-page .p-top-right { width: 300px; flex-shrink: 0; }

/* 請求先 */
.inv-page .p-to {
  font-size: 17px; font-weight: 700;
  border-bottom: 1.5px solid #111; padding-bottom: 4px;
  margin-bottom: 8px; display: inline-block; min-width: 240px;
}
.inv-page .p-ochu { font-size: 13px; font-weight: 400; margin-left: 4px; }
.inv-page .p-greeting { font-size: 12px; color: #444; margin-bottom: 18px; }

/* 金額ボックス */
.inv-page .p-amount-box {
  border: 2px solid #111; padding: 10px 16px;
  margin-bottom: 14px; display: inline-block; min-width: 260px;
}
.inv-page .p-amount-label { font-size: 11px; color: #555; margin-bottom: 3px; }
.inv-page .p-amount-value { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
.inv-page .p-kiri { font-size: 18px; font-weight: 400; }

/* 日付行 */
.inv-page .p-date-row { font-size: 12px; color: #333; }
.inv-page .p-date-label { color: #666; }
.inv-page .p-date-inline {
  display: flex; gap: 18px; flex-wrap: wrap;
  font-size: 12px; color: #333;
}
.inv-page .p-dates-right {
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid #ddd; font-size: 11.5px;
}
.inv-page .p-dates-right .p-date-row {
  color: #333; line-height: 1.9;
}

/* 発行会社（右） */
.inv-page .p-issuer-name {
  font-size: 14px; font-weight: 700; margin-bottom: 8px;
  padding-bottom: 6px; border-bottom: 1px solid #ccc;
}
/* 住所と印章を横並び */
.inv-page .p-issuer-row {
  display: flex; align-items: flex-start; gap: 10px;
}
.inv-page .p-issuer-info {
  font-size: 12px; color: #444; line-height: 1.85; flex: 1;
  white-space: nowrap;
}
.inv-page .p-stamp-wrap { flex-shrink: 0; }

/* 明細テーブル */
.inv-page table.p-items {
  width: 100%; border-collapse: collapse; margin-bottom: 0;
  font-size: 12.5px; border: 1px solid #999;
}
.inv-page table.p-items th {
  background: #2c2c3e; color: white;
  padding: 8px 10px; font-weight: 500; font-size: 12px;
  border: 1px solid #999;
}
.inv-page table.p-items td {
  padding: 7px 10px; border: 1px solid #ccc;
}
.inv-page table.p-items tr.empty td { color: transparent; height: 26px; }

/* 小計ブロック */
.inv-page .p-subtotal-block {
  border: 1px solid #999; border-top: none; margin-bottom: 22px;
}
.inv-page .p-subtotal-row {
  display: flex; justify-content: space-between;
  padding: 7px 16px; font-size: 13px; border-top: 1px solid #ddd;
}
.inv-page .p-subtotal-row.grand {
  background: #2c2c3e; color: white; font-weight: 700;
  font-size: 15px; border-top: 2px solid #999;
}

/* 振込先 */
.inv-page .p-bank {
  border: 1px solid #bbb; padding: 10px 16px;
  font-size: 12px; margin-bottom: 16px; background: #fafafa; line-height: 1.8;
}
.inv-page .p-bank-title { font-weight: 700; margin-bottom: 4px; }

/* 備考 */

</head>
<body>

<!-- Off-screen render area for PDF -->

<header>

<div class="tabs">

<main>

<!-- TAB: INVOICES -->
<div id="tab-invoices" class="tab-content active">

  </div>

  <div class="month-bar">

    <button class="btn btn-primary" onclick="openNewInvoice()">＋ 新增</button>
    <button class="btn btn-pdf" onclick="downloadAllPDF()">📥 全部下载PDF</button>
    <div class="stat" id="monthStat"></div>

  <div class="inv-table-wrap">

      <thead>

          <th>请求对象</th>
          <th>对象期间</th>

<!-- MODAL: INVOICE -->

        <label class="tpl-item"><input type="checkbox" value="月額料金" data-price="9000"><span class="tpl-name">月額料金</span><span class="tpl-price">¥9,000</span></label>
        <label class="tpl-item"><input type="checkbox" value="特定技能支援費" data-price="10000"><span class="tpl-name">特定技能支援費</span><span class="tpl-price">¥10,000/人</span></label>

</div>

<script>
// ===== DATA =====
const STORAGE_KEY = 'seikyusho_v3';
let data = { stores: [], invoices: [], lastAutoGenMonth: '' };

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
    if (data.stores.length === 0) seedDefaultData();
  } catch(e) { seedDefaultData(); }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function seedDefaultData() {
  data.stores = [
    { id:'s1',  name:'マルヤス酒場 北千住店',   monthly:9000, persons:2 },
    { id:'s2',  name:'マルヤス酒場 船橋店',     monthly:9000, persons:2 },
    { id:'s3',  name:'マルヤス酒場 柏店',       monthly:9000, persons:4 },
    { id:'s4',  name:'マルヤス酒場 蒲田店',     monthly:9000, persons:1 },
    { id:'s5',  name:'マルヤス酒場 新橋店',     monthly:9000, persons:1 },
    { id:'s6',  name:'マルヤス酒場 西葛西店',   monthly:9000, persons:1 },
    { id:'s7',  name:'羊炭長',                  monthly:9000, persons:5 },
    { id:'s8',  name:'マルヤス酒場 浦安店',     monthly:9000, persons:1 },
    { id:'s9',  name:'マルヤス酒場 神田店',     monthly:9000, persons:1 },
    { id:'s10', name:'マルヤス酒場 日暮里店',   monthly:9000, persons:1 },
    { id:'s11', name:'マルヤス酒場 本八幡店',   monthly:9000, persons:2 },
    { id:'s12', name:'マルヤス酒場 御徒町店',   monthly:9000, persons:2 },
    { id:'s13', name:'マルヤス酒場プラス 関内店', monthly:9000, persons:0 },
  ];
  data.invoices = [];
  saveData();
}

// ===== UTILS =====
function uid() { return 'i' + Date.now() + Math.random().toString(36).slice(2,8); }
function yen(n) { return '¥' + Number(n).toLocaleString(); }
function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return y + '年' + parseInt(m) + '月' + parseInt(d) + '日';
}
function getMonthStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
function calcInv(inv) {
  let sub = 0;
  (inv.lines||[]).forEach(l => sub += (l.qty||0)*(l.price||0));
  const tax = Math.floor(sub * 0.1);
  return { sub, tax, total: sub+tax };
}
function lastDayOf(y, m) { return new Date(y, m, 0).getDate(); }

// ===== TABS =====
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'preview') updatePreviewSelect();
  if (name === 'stores') renderStores();
  if (name === 'mitsumori') renderMitsumori();
}

// ===== INVOICE LIST =====
function loadInvoices() {
  const month = document.getElementById('currentMonth').value;
  const invs = data.invoices.filter(i => i.month === month);
  const tbody = document.getElementById('invoiceTableBody');

  if (!invs.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--ink-light)">
      本月暂无请求书，点击「⚡ 生成本月请求书」</td></tr>`;
    document.getElementById('invoiceCardList').innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>本月暂无请求书<br>点击「⚡ 生成本月请求书」</p></div>`;
    document.getElementById('totalRow').style.display = 'none';
    document.getElementById('monthStat').innerHTML = '';
    return;
  }

  let tSub=0, tTax=0, tTotal=0;
  const rows = invs.map(inv => {
    const {sub,tax,total} = calcInv(inv);
    tSub+=sub; tTax+=tax; tTotal+=total;
    const pl = (inv.lines||[]).find(l=>l.name.includes('技能'));
    const period = inv.periodStart ? fmtDate(inv.periodStart)+'〜'+fmtDate(inv.periodEnd) : '-';
    const statusClass = inv.status==='paid' ? 'status-paid' : 'status-pending';
    const statusLabel = inv.status==='paid' ? '支払済' : '未支払';
    return { inv, sub, tax, total, pl, period, statusClass, statusLabel };
  });

  // Table rows (desktop)
  tbody.innerHTML = rows.map(({inv,sub,tax,total,pl,period,statusClass,statusLabel}) => `<tr>
    <td><strong>${inv.name}</strong></td>
    <td style="font-size:11px;color:var(--ink-light)">${period}</td>
    <td>${pl ? pl.qty+'人' : '-'}</td>
    <td>${yen(sub)}</td>
    <td>${yen(tax)}</td>
    <td class="amount">${yen(total)}</td>
    <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
    <td class="actions">
      <button class="btn btn-outline btn-sm" onclick="editInvoice('${inv.id}')">編集</button>
      <button class="btn btn-pdf btn-sm" onclick="downloadOnePDF('${inv.id}')">📥PDF</button>
      <button class="btn btn-sm" style="background:#fee2e2;color:#991b1b" onclick="deleteInvoice('${inv.id}')">削除</button>
    </td>
  </tr>`).join('');

  // Card list (mobile)
  document.getElementById('invoiceCardList').innerHTML = rows.map(({inv,sub,tax,total,pl,period,statusClass,statusLabel}) => `
    <div class="inv-card">
      <div class="inv-card-header">
        <div class="inv-card-name">${inv.name}</div>
        <span class="status-badge ${statusClass} inv-card-badge">${statusLabel}</span>
      </div>
      <div class="inv-card-body">
        <div class="inv-card-row"><label>対象期間</label><span class="val" style="font-size:12px">${period}</span></div>
        <div class="inv-card-row"><label>支援人数</label><span class="val">${pl ? pl.qty+'人' : '-'}</span></div>
        <div class="inv-card-row"><label>小計</label><span class="val">${yen(sub)}</span></div>
        <div class="inv-card-row"><label>消費税(10%)</label><span class="val">${yen(tax)}</span></div>
      </div>
      <div class="inv-card-total">
        <label>請求金額(税込)</label>
        <span class="amount">${yen(total)}</span>
      </div>
      <div class="inv-card-actions">
        <button class="btn btn-outline btn-sm" onclick="editInvoice('${inv.id}')">✏️ 編集</button>
        <button class="btn btn-blue btn-sm" onclick="previewInvoice('inv:${inv.id}')">👁 表示</button>
        <button class="btn btn-pdf btn-sm" onclick="downloadOnePDF('${inv.id}')">📥 PDF</button>
        <button class="btn btn-sm" style="background:#fee2e2;color:#991b1b" onclick="deleteInvoice('${inv.id}')">🗑 削除</button>
      </div>
    </div>`).join('');

  document.getElementById('totalRow').style.display = 'flex';
  document.getElementById('totalSubtotal').textContent = yen(tSub);
  document.getElementById('totalTax').textContent = yen(tTax);
  document.getElementById('totalGrand').textContent = yen(tTotal);
  document.getElementById('monthStat').innerHTML = `共 <strong>${invs.length}</strong> 件　合計 <strong>${yen(tTotal)}</strong>`;
}

// ===== GENERATE =====
function generateMonth() {
  const month = document.getElementById('currentMonth').value;
  if (!month) { alert('请先选择月份'); return; }
  const existing = data.invoices.filter(i=>i.month===month);
  if (existing.length && !confirm(`本月已有 ${existing.length} 件，是否覆盖重新生成？`)) return;
  data.invoices = data.invoices.filter(i=>i.month!==month);

  const [y,m] = month.split('-').map(Number);
  const ld = lastDayOf(y,m);
  const ps = `${y}-${String(m).padStart(2,'0')}-01`;
  const pe = `${y}-${String(m).padStart(2,'0')}-${ld}`;
  const due = `${m===12?y+1:y}-${String(m===12?1:m+1).padStart(2,'0')}-28`;

  data.stores.forEach(s => {
    const lines = [{ name:`${y}.${m}.1-${y}.${m}.${ld} 月額料金`, qty:1, price:s.monthly }];
    if (s.persons>0) lines.push({ name:'特定技能支援費', qty:s.persons, price:10000 });
    data.invoices.push({ id:uid(), month, name:s.name, storeId:s.id, periodStart:ps, periodEnd:pe, due, lines, status:'pending' });
  });
  saveData(); loadInvoices();
  alert(`✅ 已生成 ${data.stores.length} 件请求书！`);
}

async function renderPageToPDF(jspdf, inv, pageIndex) {
  const area = document.getElementById('pdfRenderArea');
  area.innerHTML = buildInvHTML(inv);
  await new Promise(r => setTimeout(r, 300));

  const canvas = await html2canvas(area.firstChild, {
    scale: 2, useCORS: true, backgroundColor: '#ffffff',
    width: 794, windowWidth: 794
  });

  const imgData = canvas.toDataURL('image/jpeg', 0.95);
  if (pageIndex > 0) jspdf.addPage();
  const pdfW = jspdf.internal.pageSize.getWidth();
  const pdfH = jspdf.internal.pageSize.getHeight();
  jspdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
}

async function downloadOnePDF(id) {
  const inv = data.invoices.find(i=>i.id===id);
  if (!inv) return;
  showLoading(`正在生成：${inv.name}`);
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    await renderPageToPDF(doc, inv, 0);
    const safeName = inv.name.replace(/[\/\\:*?"<>|]/g,'_');
    doc.save(`請求書_${safeName}_${inv.month}.pdf`);
  } catch(e) {
    alert('PDF生成失败：' + e.message);
  } finally {
    document.getElementById('pdfRenderArea').innerHTML = '';
    hideLoading();
  }
}

async function downloadAllPDF() {
  const month = document.getElementById('currentMonth').value;
  const invs = data.invoices.filter(i=>i.month===month);
  if (!invs.length) { alert('本月暂无请求书'); return; }
  showLoading(`正在生成 ${invs.length} 张请求书... (1/${invs.length})`);
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    for (let i=0; i<invs.length; i++) {
      document.getElementById('pdfLoadingMsg').textContent = `正在处理：${invs[i].name} (${i+1}/${invs.length})`;
      await renderPageToPDF(doc, invs[i], i);
    }
    doc.save(`請求書_${month}_全店舗.pdf`);
  } catch(e) {
    alert('PDF生成失败：' + e.message);
  } finally {
    document.getElementById('pdfRenderArea').innerHTML = '';
    hideLoading();
  }
}

function calcMit(m) {
  let sub = 0;
  (m.lines||[]).forEach(l => { sub += Math.max(0, (l.qty||0)*(l.price||0) - (l.discount||0)); });
  const tax = Math.floor(sub * 0.1);
  return { sub, tax, total: sub+tax };
}

function nextMitSeq() {
  const list = data.mitsumori || [];
  if (!list.length) return 1;
  return Math.max(...list.map(m => m.seq||0)) + 1;
}

  }
  saveData(); closeModal('mitsumoriModal'); renderMitsumori();

async function downloadMitsumoriPDF(id) {
  const m = (data.mitsumori||[]).find(x=>x.id===id);
  if (!m) return;
  showLoading(`見積書 No.${m.seq} を生成中...`);
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const area = document.getElementById('pdfRenderArea');
    area.innerHTML = buildMitsumoriHTML(m);
    await new Promise(r => setTimeout(r, 300));
    const canvas = await html2canvas(area.firstChild, { scale:2, useCORS:true, backgroundColor:'#ffffff', width:794, windowWidth:794 });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const pdfW = doc.internal.pageSize.getWidth();
    const pdfH = doc.internal.pageSize.getHeight();
    doc.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
    const safeName = m.name.replace(/[\/\\:*?"<>|]/g,'_');
    doc.save(`見積書_No${m.seq}_${safeName}.pdf`);
  } catch(e) { alert('PDF生成失败：'+e.message); }
  finally { document.getElementById('pdfRenderArea').innerHTML=''; hideLoading(); }
}
