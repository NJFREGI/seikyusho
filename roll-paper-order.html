<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ロール紙注文</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: #111827;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 14px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: 18px 16px 20px;
    }
    .title {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      margin: 4px 0 8px;
      letter-spacing: 1px;
    }
    .sub {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .section {
      margin-top: 18px;
    }
    .section-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #111827;
    }
    .field {
      margin-bottom: 14px;
    }
    .label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #374151;
    }
    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
    }
    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: #111827;
    }
    .textarea {
      min-height: 92px;
      resize: vertical;
      font-family: inherit;
    }
    .readonly {
      background: #f9fafb;
      color: #111827;
    }
    .spec-grid {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
      margin-bottom: 10px;
    }
    .help {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.7;
      margin-top: 4px;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }
    .btn-mail {
      background: #111827;
      color: #fff;
    }
    .btn-print {
      background: #e5e7eb;
      color: #111827;
    }
    .preview {
      margin-top: 20px;
      padding: 14px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .preview-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .preview pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.8;
      color: #374151;
      font-family: inherit;
    }

    @media print {
      body { background: #fff !important; }
      .wrap { max-width: 100%; padding: 0; }
      .card { box-shadow: none; border-radius: 0; padding: 12px; }
      .actions, .preview { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">ロール紙注文</div>
      <div class="sub">
        必要事項を入力後、ページ下部の「転送メール作成」を押してください。<br>
        発注日は本日の日付で自動入力されます。
      </div>

      <div class="section">
        <div class="section-title">発注日</div>
        <div class="field">
          <input id="orderDate" class="input readonly" type="text" readonly>
        </div>
      </div>

      <div class="section">
        <div class="section-title">ロール紙情報</div>

        <div class="spec-grid">
          <select id="paperSpec1" class="select">
            <option value="">規格を選択してください</option>
            <option value="2443-88（80mm×80Φ×12mm / 75μ / 20巻）">2443-88（80mm×80Φ×12mm / 75μ / 20巻）</option>
            <option value="75-88（80mm×80Φ×12mm / 75μ / 48巻）">75-88（80mm×80Φ×12mm / 75μ / 48巻）</option>
          </select>
          <input id="paperQty1" class="input" type="number" min="0" placeholder="数量">
        </div>

        <div class="spec-grid">
          <select id="paperSpec2" class="select">
            <option value="">規格を選択してください</option>
            <option value="2443-88（80mm×80Φ×12mm / 75μ / 20巻）">2443-88（80mm×80Φ×12mm / 75μ / 20巻）</option>
            <option value="75-88（80mm×80Φ×12mm / 75μ / 48巻）">75-88（80mm×80Φ×12mm / 75μ / 48巻）</option>
          </select>
          <input id="paperQty2" class="input" type="number" min="0" placeholder="数量">
        </div>

        <div class="help">
          不要的项目可以留空。数量为 0 或未填写的项目不会显示在邮件内容中。
        </div>
      </div>

      <div class="section">
        <div class="section-title">お届け先</div>

        <div class="field">
          <label class="label" for="deliverToName">お届け先御会社名</label>
          <input id="deliverToName" class="input" type="text" placeholder="例：〇〇株式会社">
        </div>

        <div class="field">
          <label class="label" for="deliverAddress">ご住所</label>
          <textarea id="deliverAddress" class="textarea" placeholder="例：東京都〇〇区〇〇 1-2-3"></textarea>
        </div>

        <div class="field">
          <label class="label" for="deliverTel">TEL</label>
          <input id="deliverTel" class="input" type="text" placeholder="例：03-1234-5678">
        </div>
      </div>

      <div class="section">
        <div class="field">
          <label class="label" for="note">備考（任意）</label>
          <textarea id="note" class="textarea" placeholder="例：平日午前中着希望"></textarea>
        </div>
      </div>

      <div class="actions">
        <a id="mailBtn" class="btn btn-mail" href="javascript:void(0)">転送メール作成</a>
        <button class="btn btn-print" type="button" onclick="window.print()">印刷</button>
      </div>

      <div class="preview">
        <div class="preview-title">邮件内容预览</div>
        <pre id="mailPreview"></pre>
      </div>
    </div>
  </div>

  <script>
    const ORDER_FROM = {
      merchantName: "金澤企画国際株式会社【コード　6831】",
      emailTo: "info@gm-life.co.jp"
    };

    function todayText() {
      const d = new Date();
      return d.getFullYear() + "年 " + (d.getMonth() + 1) + "月 " + d.getDate() + "日";
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function buildOrderItems() {
      const spec1 = getValue("paperSpec1");
      const qty1 = Number(getValue("paperQty1") || 0);
      const spec2 = getValue("paperSpec2");
      const qty2 = Number(getValue("paperQty2") || 0);

      const items = [];
      if (spec1 && qty1 > 0) items.push(spec1 + "　" + qty1 + "箱");
      if (spec2 && qty2 > 0) items.push(spec2 + "　" + qty2 + "箱");
      return items;
    }

    function buildMailContent() {
      const orderDate = getValue("orderDate");
      const deliverToName = getValue("deliverToName");
      const deliverAddress = getValue("deliverAddress");
      const deliverTel = getValue("deliverTel");
      const note = getValue("note");
      const items = buildOrderItems();

      const lines = [
        "ロール紙注文依頼",
        "",
        "発注日：" + orderDate,
        "",
        "【注文内容】"
      ];

      if (items.length > 0) {
        items.forEach(function(item) {
          lines.push(item);
        });
      } else {
        lines.push("※注文内容未入力");
      }

      lines.push(
        "",
        "【お届け先】",
        "御会社名：" + deliverToName,
        "ご住所：" + deliverAddress,
        "TEL：" + deliverTel
      );

      if (note) {
        lines.push("", "【備考】", note);
      }

      lines.push(
        "",
        "お手数をおかけしますが、何卒よろしくお願い申し上げます。"
      );

      return lines.join("\r\n");
    }

    function updateMailLink() {
      const subject = ORDER_FROM.merchantName + "【ロール紙注文】";
      const body = buildMailContent();
      const href =
        "mailto:" + ORDER_FROM.emailTo +
        "?subject=" + encodeURIComponent(subject) +
        "&body=" + encodeURIComponent(body);

      document.getElementById("mailBtn").href = href;
      document.getElementById("mailPreview").textContent = body;
    }

    function init() {
      document.getElementById("orderDate").value = todayText();

      const ids = [
        "paperSpec1",
        "paperQty1",
        "paperSpec2",
        "paperQty2",
        "deliverToName",
        "deliverAddress",
        "deliverTel",
        "note"
      ];

      ids.forEach(function(id) {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", updateMailLink);
          el.addEventListener("change", updateMailLink);
        }
      });

      updateMailLink();
    }

    init();
  </script>
</body>
</html>
